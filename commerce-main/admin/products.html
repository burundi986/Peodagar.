<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products | Peodagar Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f7; }
    .admin-wrapper { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 280px; background: #1a1a2e; color: white; padding: 32px 24px; position: fixed; height: 100vh; }
    .admin-sidebar .logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 40px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #aaa; text-decoration: none; border-radius: 12px; margin-bottom: 8px; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: #c27b3a; color: white; }
    .admin-main { flex: 1; margin-left: 280px; }
    .admin-header { background: white; padding: 20px 32px; display: flex; justify-content: space-between; border-bottom: 1px solid #e0e0e0; }
    .admin-content { padding: 32px; }
    .add-product-btn { background: #c27b3a; color: white; border: none; padding: 14px 28px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 24px; }
    .products-table { background: white; border-radius: 20px; padding: 24px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #eee; }
    .edit-btn, .delete-btn { padding: 8px 16px; margin: 0 4px; border: none; border-radius: 8px; cursor: pointer; }
    .edit-btn { background: #4c9aff; color: white; }
    .delete-btn { background: #ff4444; color: white; }
    .product-image-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background: #f0f0f0; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 32px; border-radius: 24px; max-width: 500px; width: 90%; }
    .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 12px; margin: 10px 0 20px; border: 2px solid #e0e0e0; border-radius: 12px; }
    .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
    .save-btn { background: #c27b3a; color: white; border: none; padding: 12px; border-radius: 12px; flex: 1; cursor: pointer; }
    .cancel-btn { background: #f0f0f0; color: #666; border: none; padding: 12px; border-radius: 12px; flex: 1; cursor: pointer; }
    .image-preview-area { display: flex; gap: 20px; align-items: center; margin: 10px 0 20px; }
    .image-preview { width: 100px; height: 100px; border: 2px dashed #ddd; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f8f9fa; }
    .image-preview img { max-width: 100%; max-height: 100%; object-fit: cover; }
    .upload-btn { background: #c27b3a; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    .image-input { display: none; }
    .notification { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 12px; color: white; z-index: 2000; animation: slideIn 0.3s ease; }
    .notification.success { background: #4caf50; }
    .notification.error { background: #ff4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 768px) { .admin-sidebar { transform: translateX(-100%); position: fixed; } .admin-sidebar.active { transform: translateX(0); } .admin-main { margin-left: 0; } .menu-toggle { display: block; position: fixed; top: 20px; left: 20px; z-index: 101; background: #c27b3a; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; } }
    .menu-toggle { display: none; }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="logo">✨ LUXE.</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html" class="active"><i class="fas fa-box"></i> Products</a>
        <a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a>
        <a href="users.html"><i class="fas fa-users"></i> Users</a>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <h2>Manage Products</h2>
        <button id="logoutHeaderBtn" style="background:none; border:none; color:#c27b3a; cursor:pointer;">Logout</button>
      </div>
      <div class="admin-content">
        <button class="add-product-btn" id="addProductBtn"><i class="fas fa-plus"></i> Add New Product</button>
        <div class="products-table">
          <table id="productsTable">
            <thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Price</th><th>Category</th><th>Actions</th></tr></thead>
            <tbody id="productsTableBody"><tr><td colspan="6" style="text-align:center; padding:40px;">Loading products...</td></tr></tbody>
          }</table>
        </div>
      </div>
    </main>
  </div>

  <div id="productModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Add New Product</h3>
      <form id="productForm">
        <input type="hidden" id="productId">
        <input type="text" id="productName" placeholder="Product Name" required>
        <input type="number" id="productPrice" placeholder="Price (₦)" required>
        <select id="productCategory" required>
          <option value="">Select Category</option>
          <option>Accessories</option><option>Electronics</option><option>Home & Living</option><option>Fashion</option>
        </select>
        <textarea id="productDesc" rows="3" placeholder="Description"></textarea>
        <div class="image-preview-area">
          <div class="image-preview" id="imagePreview"><i class="fas fa-image" style="font-size: 40px; color: #ccc;"></i></div>
          <button type="button" class="upload-btn" onclick="document.getElementById('imageFileInput').click()"><i class="fas fa-upload"></i> Choose Image</button>
        </div>
        <input type="file" id="imageFileInput" class="image-input" accept="image/jpeg,image/png,image/gif">
        <div class="modal-buttons">
          <button type="submit" class="save-btn">Save Product</button>
          <button type="button" class="cancel-btn" id="closeModalBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    let currentImageFile = null;
    
    async function checkAuth() {
      const user = window.getCurrentUser();
      if (!user || user.role !== 'admin') window.location.href = 'login.html';
    }
    
    function imageToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
      });
    }
    
    async function renderProducts() {
      const products = await window.getProducts();
      const tbody = document.getElementById('productsTableBody');
      if (products.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">No products found. Click "Add New Product" to get started.</td></tr>'; return; }
      tbody.innerHTML = products.map(p => `
        <tr><td>${p.id}</td><td><img class="product-image-preview" src="${p.image || 'https://placehold.co/100x100?text=No+Image'}" onerror="this.src='https://placehold.co/100x100?text=No+Image'"></td>
        <td><strong>${escapeHtml(p.name)}</strong></td><td style="color:#c27b3a; font-weight:600;">₦${p.price.toLocaleString()}</td>
        <td>${p.category || '-'}</td>
        <td><button class="edit-btn" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button>
        <button class="delete-btn" onclick="deleteProductHandler(${p.id})"><i class="fas fa-trash"></i> Delete</button></td></tr>
      `).join('');
    }
    
    window.editProduct = async function(id) {
      const products = await window.getProducts();
      const product = products.find(p => p.id === id);
      if (product) {
        document.getElementById('modalTitle').textContent = 'Edit Product';
        document.getElementById('productId').value = product.id;
        document.getElementById('productName').value = product.name;
        document.getElementById('productPrice').value = product.price;
        document.getElementById('productCategory').value = product.category;
        document.getElementById('productDesc').value = product.description;
        if (product.image) document.getElementById('imagePreview').innerHTML = `<img src="${product.image}" style="width:100%; height:100%; object-fit:cover;">`;
        document.getElementById('productModal').classList.add('active');
      }
    };
    
    window.deleteProductHandler = async function(id) {
      if (confirm('Delete this product?')) {
        await window.deleteProduct(id);
        await renderProducts();
        showNotification('Product deleted!', 'success');
      }
    };
    
    document.getElementById('imageFileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 2 * 1024 * 1024) { alert('Image must be < 2MB'); return; }
        currentImageFile = file;
        const reader = new FileReader();
        reader.onload = (event) => { document.getElementById('imagePreview').innerHTML = `<img src="${event.target.result}" style="width:100%; height:100%; object-fit:cover;">`; };
        reader.readAsDataURL(file);
      }
    });
    
    document.getElementById('addProductBtn').onclick = () => {
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
      document.getElementById('imagePreview').innerHTML = '<i class="fas fa-image" style="font-size: 40px; color: #ccc;"></i>';
      currentImageFile = null;
      document.getElementById('productModal').classList.add('active');
    };
    
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('productModal').classList.remove('active');
    
    document.getElementById('productForm').onsubmit = async (e) => {
      e.preventDefault();
      const productData = {
        name: document.getElementById('productName').value,
        price: parseInt(document.getElementById('productPrice').value),
        category: document.getElementById('productCategory').value,
        description: document.getElementById('productDesc').value
      };
      const id = document.getElementById('productId').value;
      if (currentImageFile) productData.image = await imageToBase64(currentImageFile);
      if (id) { await window.updateProduct(parseInt(id), productData); showNotification('Product updated!', 'success'); }
      else { await window.addProduct(productData); showNotification('Product added!', 'success'); }
      document.getElementById('productModal').classList.remove('active');
      await renderProducts();
    };
    
    function showNotification(msg, type) {
      const n = document.createElement('div'); n.className = `notification ${type}`; n.innerHTML = msg;
      document.body.appendChild(n); setTimeout(() => n.remove(), 3000);
    }
    function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function logout() { window.logoutUser(); window.location.href = 'login.html'; }
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('logoutHeaderBtn').onclick = logout;
    document.getElementById('menuToggle').onclick = () => document.getElementById('adminSidebar').classList.toggle('active');
    window.onclick = (e) => { if (e.target === document.getElementById('productModal')) document.getElementById('productModal').classList.remove('active'); };
    
    checkAuth();
    renderProducts();
  </script>
</body>
</html>
