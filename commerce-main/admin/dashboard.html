<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Peodagar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f7; }
    .admin-wrapper { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 280px; background: #1a1a2e; color: white; padding: 32px 24px; position: fixed; height: 100vh; }
    .admin-sidebar .logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 40px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #aaa; text-decoration: none; border-radius: 12px; margin-bottom: 8px; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: #c27b3a; color: white; }
    .admin-main { flex: 1; margin-left: 280px; }
    .admin-header { background: white; padding: 20px 32px; display: flex; justify-content: space-between; border-bottom: 1px solid #e0e0e0; }
    .user-info { display: flex; align-items: center; gap: 16px; }
    .user-avatar { width: 40px; height: 40px; background: #c27b3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .logout-btn { background: none; border: none; color: #c27b3a; cursor: pointer; }
    .admin-content { padding: 32px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; }
    .stat-card { background: white; padding: 24px; border-radius: 20px; }
    .stat-number { font-size: 2.5rem; font-weight: 800; color: #c27b3a; }
    .recent-orders { background: white; border-radius: 20px; padding: 24px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-block; }
    .status-pending { background: #fff3cd; color: #856404; }
    @media (max-width: 768px) { .admin-sidebar { transform: translateX(-100%); } .admin-main { margin-left: 0; } .menu-toggle { display: block; } }
    .menu-toggle { display: none; position: fixed; top: 20px; left: 20px; z-index: 101; background: #c27b3a; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="logo">✨ Peodagar</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a>
        <a href="users.html"><i class="fas fa-users"></i> Users</a>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <h2>Dashboard Overview</h2>
        <div class="user-info"><div class="user-avatar" id="userAvatar">A</div><div><div id="userName"></div></div><button class="logout-btn" id="logoutHeaderBtn">Logout</button></div>
      </div>
      <div class="admin-content">
        <div class="stats-grid">
          <div class="stat-card"><h3>Total Products</h3><div class="stat-number" id="totalProducts">0</div></div>
          <div class="stat-card"><h3>Total Orders</h3><div class="stat-number" id="totalOrders">0</div></div>
          <div class="stat-card"><h3>Revenue</h3><div class="stat-number" id="totalRevenue">₦0</div></div>
          <div class="stat-card"><h3>Pending Orders</h3><div class="stat-number" id="pendingOrders">0</div></div>
        </div>
        <div class="recent-orders"><h3>Recent Orders</h3><table id="recentOrdersTable"><thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    // Wait for functions to load
    setTimeout(async function() {
      const user = typeof window.getCurrentUser === 'function' ? window.getCurrentUser() : null;
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userAvatar').textContent = user.name.charAt(0);
      
      async function loadDashboard() {
        if (typeof window.getProducts !== 'function') return;
        const products = await window.getProducts();
        const orders = await window.getOrders();
        document.getElementById('totalProducts').textContent = products.length;
        document.getElementById('totalOrders').textContent = orders.length;
        document.getElementById('totalRevenue').textContent = `₦${orders.reduce((s, o) => s + (o.total || 0), 0).toLocaleString()}`;
        document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'pending').length;
        document.getElementById('ordersTableBody').innerHTML = orders.slice(-5).reverse().map(o => `<tr><td>#${o.id}</td><td>${o.customer}</td><td>₦${(o.total || 0).toLocaleString()}</td><td><span class="status-badge status-${o.status}">${o.status}</span></td><td>${o.date}</td>`).join('');
      }
      
      await loadDashboard();
      
      function logout() { if (typeof window.logoutUser === 'function') window.logoutUser(); window.location.href = 'login.html'; }
      document.getElementById('logoutBtn').onclick = logout;
      document.getElementById('logoutHeaderBtn').onclick = logout;
      document.getElementById('menuToggle').onclick = () => document.getElementById('adminSidebar').classList.toggle('active');
    }, 1000);
  </script>
</body>
</html>
