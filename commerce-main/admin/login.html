
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Peodagar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Inter', sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}

.login-container {
width: 100%;
max-width: 480px;
}

.login-card {
background: white;
border-radius: 32px;
padding: 48px 40px;
box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
from {
opacity: 0;
transform: translateY(-20px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

.login-header {
text-align: center;
margin-bottom: 32px;
}

.login-header .logo {
font-size: 2.5rem;
font-weight: 800;
margin-bottom: 16px;
display: inline-block;
background: linear-gradient(135deg, #1e1e2a, #2d2f3e);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}

.login-header h2 {
font-size: 1.8rem;
color: #1e1e2a;
margin-bottom: 8px;
}

.login-header p {
color: #666;
font-size: 0.9rem;
}

.form-group {
margin-bottom: 24px;
}

.form-group label {
display: block;
margin-bottom: 8px;
font-weight: 500;
color: #333;
}

.form-group input {
width: 100%;
padding: 14px 16px;
border: 2px solid #e0e0e0;
border-radius: 16px;
font-size: 1rem;
transition: 0.2s;
}

.form-group input:focus {
border-color: #c27b3a;
outline: none;
}

.login-btn {
width: 100%;
padding: 14px;
background: #c27b3a;
color: white;
border: none;
border-radius: 16px;
font-weight: 600;
font-size: 1rem;
cursor: pointer;
transition: 0.2s;
}

.login-btn:hover {
background: #a5622c;
transform: translateY(-2px);
}

.demo-buttons {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
margin-top: 24px;
}

.demo-btn {
padding: 10px;
background: #f8f9fa;
border: 1px solid #dee2e6;
border-radius: 12px;
cursor: pointer;
font-size: 0.85rem;
transition: 0.2s;
}

.demo-btn:hover {
background: #c27b3a;
color: white;
border-color: #c27b3a;
}

.error-message {
background: #fee;
color: #c33;
padding: 12px;
border-radius: 12px;
margin-bottom: 20px;
display: none;
font-size: 0.9rem;
text-align: center;
}

.success-message {
background: #d4edda;
color: #155724;
padding: 12px;
border-radius: 12px;
margin-bottom: 20px;
display: none;
font-size: 0.9rem;
text-align: center;
}

.back-link {
text-align: center;
margin-top: 24px;
}

.back-link a {
color: #666;
text-decoration: none;
font-size: 0.9rem;
transition: 0.2s;
}

.back-link a:hover {
color: #c27b3a;
}

.loading {
display: inline-block;
width: 16px;
height: 16px;
border: 2px solid #fff;
border-radius: 50%;
border-top-color: transparent;
animation: spin 0.6s linear infinite;
margin-right: 8px;
}

@keyframes spin {
to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="login-container">
<div class="login-card">
<div class="login-header">
<div class="logo">✨ Peodagar</div>
<h2>Admin Portal</h2>
<p>Enter your credentials to continue</p>
</div>

<div class="error-message" id="errorMsg"></div>
<div class="success-message" id="successMsg"></div>

<form id="adminLoginForm">
<div class="form-group">
<label>Email Address</label>
<input type="email" id="adminEmail" placeholder="admin@luxe.com" required autocomplete="email">
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="adminPassword" placeholder="Enter password" required autocomplete="current-password">
</div>
<button type="submit" class="login-btn" id="loginBtn">
<i class="fas fa-sign-in-alt"></i> Login to Dashboard
</button>
</form>

<div class="demo-buttons">
<button class="demo-btn" data-email="admin@luxe.com" data-password="admin123">
<i class="fas fa-crown"></i> Admin Access
</button>
<button class="demo-btn" data-email="manager@luxe.com" data-password="manager123">
<i class="fas fa-chart-line"></i> Manager
</button>
<button class="demo-btn" data-email="editor@luxe.com" data-password="editor123">
<i class="fas fa-edit"></i> Editor
</button>
<button class="demo-btn" data-email="viewer@luxe.com" data-password="viewer123">
<i class="fas fa-eye"></i> Viewer
</button>
</div>

<div class="back-link">
<a href="../index.html">
<i class="fas fa-arrow-left"></i> Back to Store
</a>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script>
// Get DOM elements
const form = document.getElementById('adminLoginForm');
const emailInput = document.getElementById('adminEmail');
const passwordInput = document.getElementById('adminPassword');
const loginBtn = document.getElementById('loginBtn');
const errorMsg = document.getElementById('errorMsg');
const successMsg = document.getElementById('successMsg');

// Helper function to show error
function showError(message) {
errorMsg.textContent = message;
errorMsg.style.display = 'block';
successMsg.style.display = 'none';
setTimeout(() => {
errorMsg.style.display = 'none';
}, 5000);
}

// Helper function to show success
function showSuccess(message) {
successMsg.textContent = message;
successMsg.style.display = 'block';
errorMsg.style.display = 'none';
setTimeout(() => {
successMsg.style.display = 'none';
}, 3000);
}

// Helper function to show loading state
function setLoading(isLoading) {
if (isLoading) {
loginBtn.disabled = true;
loginBtn.innerHTML = '<span class="loading"></span> Logging in...';
} else {
loginBtn.disabled = false;
loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
}
}

// Check if user is already logged in
async function checkExistingSession() {
if (typeof window.getCurrentUser === 'function') {
const user = window.getCurrentUser();
if (user && user.role === 'admin') {
window.location.href = 'dashboard.html';
}
}
}

// Login form submission
form.addEventListener('submit', async (e) => {
e.preventDefault();

const email = emailInput.value.trim();
const password = passwordInput.value;

if (!email || !password) {
showError('Please enter both email and password');
return;
}

setLoading(true);

// Check if Supabase is loaded
if (typeof window.loginUser !== 'function') {
console.error('loginUser function not found. Waiting for scripts...');

// Wait for scripts to load (max 5 seconds)
let attempts = 0;
const waitForScripts = setInterval(() => {
attempts++;
if (typeof window.loginUser === 'function') {
clearInterval(waitForScripts);
performLogin(email, password);
} else if (attempts > 50) {
clearInterval(waitForScripts);
setLoading(false);
showError('Authentication system failed to load. Please refresh the page.');
}
}, 100);
} else {
await performLogin(email, password);
}
});

async function performLogin(email, password) {
try {
const user = await window.loginUser(email, password);

if (user) {
showSuccess('Login successful! Redirecting...');
setTimeout(() => {
window.location.href = 'dashboard.html';
}, 1000);
} else {
setLoading(false);
showError('Invalid email or password');
}
} catch (error) {
setLoading(false);
console.error('Login error:', error);
showError(error.message || 'Login failed. Please try again.');
}
}

// Demo buttons
document.querySelectorAll('.demo-btn').forEach(btn => {
btn.addEventListener('click', () => {
const email = btn.dataset.email;
const password = btn.dataset.password;
emailInput.value = email;
passwordInput.value = password;

// Trigger form submission
const submitEvent = new Event('submit');
form.dispatchEvent(submitEvent);
});
});

// Check for existing session on page load
checkExistingSession();

// Add keyboard shortcut (Enter key submits form)
passwordInput.addEventListener('keypress', (e) => {
if (e.key === 'Enter') {
form.dispatchEvent(new Event('submit'));
}
});

console.log('✅ Admin login page loaded');
console.log('Supabase client status:', typeof window.loginUser === 'function' ? 'Loaded' : 'Not loaded yet');
</script>
</body>
</html>
