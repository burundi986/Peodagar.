<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders | Peodagar Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f7; }
    .admin-wrapper { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 280px; background: #1a1a2e; color: white; padding: 32px 24px; position: fixed; height: 100vh; }
    .admin-sidebar .logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 40px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #aaa; text-decoration: none; border-radius: 12px; margin-bottom: 8px; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: #c27b3a; color: white; }
    .admin-main { flex: 1; margin-left: 280px; }
    .admin-header { background: white; padding: 20px 32px; display: flex; justify-content: space-between; border-bottom: 1px solid #e0e0e0; }
    .admin-content { padding: 32px; }
    .orders-table { background: white; border-radius: 20px; padding: 24px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-block; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-shipped { background: #d1ecf1; color: #0c5460; }
    .status-delivered { background: #d4edda; color: #155724; }
    .status-select { padding: 6px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
    .logout-btn { background: none; border: none; color: #c27b3a; cursor: pointer; }
    @media (max-width: 768px) { .admin-sidebar { transform: translateX(-100%); } .admin-main { margin-left: 0; } .menu-toggle { display: block; } }
    .menu-toggle { display: none; position: fixed; top: 20px; left: 20px; z-index: 101; background: #c27b3a; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="logo">✨ LUXE.</div>
      <nav class="sidebar-nav"><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a><a href="products.html"><i class="fas fa-box"></i> Products</a><a href="orders.html" class="active"><i class="fas fa-shopping-cart"></i> Orders</a><a href="users.html"><i class="fas fa-users"></i> Users</a><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header"><h2>Manage Orders</h2><button class="logout-btn" id="logoutHeaderBtn">Logout</button></div>
      <div class="admin-content"><div class="orders-table"><table id="ordersTable"><thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Action</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div></div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    const user = window.getCurrentUser();
    if (!user || user.role !== 'admin') window.location.href = 'login.html';
    
    async function renderOrders() {
      const orders = await window.getOrders();
      const tbody = document.getElementById('ordersTableBody');
      tbody.innerHTML = orders.map(order => `
        <tr>
          <td>#${order.id}</td>
          <td>${order.customer}</td>
          <td>${order.items?.map(i => i.name).join(', ') || '-'}</td>
          <td>₦${(order.total || 0).toLocaleString()}</td>
          <td><span class="status-badge status-${order.status}">${order.status}</span></td>
          <td>${order.date}</td>
          <td><select class="status-select" data-id="${order.id}"><option ${order.status === 'pending' ? 'selected' : ''}>pending</option><option ${order.status === 'shipped' ? 'selected' : ''}>shipped</option><option ${order.status === 'delivered' ? 'selected' : ''}>delivered</option></select></td>
        </tr>
      `).join('');
      document.querySelectorAll('.status-select').forEach(select => { select.addEventListener('change', async (e) => { await window.updateOrderStatus(parseInt(select.dataset.id), select.value); await renderOrders(); }); });
    }
    
    function logout() { window.logoutUser(); window.location.href = 'login.html'; }
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('logoutHeaderBtn').onclick = logout;
    document.getElementById('menuToggle').onclick = () => document.getElementById('adminSidebar').classList.toggle('active');
    renderOrders();
  </script>
</body>
</html>
